events {}

http {
    # Rate limiting zone: 5 requests per second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # Load balancing upstream with 3 API instances
    upstream api_backend {
        server api1:3000;
        server api2:3000;
        server api3:3000;
    }

    # HTTP server - redirects all traffic to HTTPS
    server {
        listen 80;
        server_name localhost;
        
        # Redirect HTTP to HTTPS on port 8443
        return 301 https://$host:8443$request_uri;   # ← Added :8443
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name localhost;

        # SSL certificates
        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        
        # SSL protocols and ciphers
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Reverse proxy configuration
        location / {
            # Apply rate limiting
            limit_req zone=api_limit burst=10 nodelay;
            
            # Proxy to backend
            proxy_pass http://api_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }
    }
}