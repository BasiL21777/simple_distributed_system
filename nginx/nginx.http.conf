events {}

http {
    # Rate limiting zone: 5 requests per second per IP, 10MB memory
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # Load balancing upstream with 3 API instances
    upstream api_backend {
        server api1:3000;
        server api2:3000;
        server api3:3000;
    }

    # HTTP server (no HTTPS, no redirect - for MITM testing)
    server {
        listen 80;
        server_name localhost;

        # Reverse proxy configuration
        location / {
            # Apply rate limiting (5r/s, burst 10, no delay)
            limit_req zone=api_limit burst=10 nodelay;
            
            # Reverse proxy to load balanced backend
            proxy_pass http://api_backend;
            
            # Proxy headers
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto http;
            
            # Timeout settings
            proxy_connect_timeout 30s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }
        
        # Health check endpoint (no rate limiting)
        location /health {
            proxy_pass http://api_backend/health;
            proxy_set_header Host $host;
        }
    }
}